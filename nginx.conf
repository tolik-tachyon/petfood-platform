# Docker embedded DNS — re-resolve upstreams when containers restart with new IPs.
resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 5555;
    server_name _;
    client_max_body_size 100M;

    # Frontend
    location / {
        set $upstream_frontend frontend;
        proxy_pass http://$upstream_frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API Gateway
    location /api {
        set $upstream_api gateway-service;
        proxy_pass http://$upstream_api:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Recommender OpenAPI spec
    location /recommender/openapi.json {
        set $upstream_recommender recommender-api;
        proxy_pass http://$upstream_recommender:8000/openapi.json;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Recommender Swagger/ReDoc docs
    location /recommender/docs {
        set $upstream_recommender recommender-api;
        proxy_pass http://$upstream_recommender:8000/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /recommender/redoc {
        set $upstream_recommender recommender-api;
        proxy_pass http://$upstream_recommender:8000/redoc;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Recommender API
    location /recommender/ {
        set $upstream_recommender recommender-api;
        rewrite ^/recommender/(.*)$ /$1 break;
        proxy_pass http://$upstream_recommender:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # MinIO API (S3)
    location /minio/ {
        set $upstream_minio minio;
        rewrite ^/minio/(.*)$ /$1 break;
        proxy_pass http://$upstream_minio:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # MinIO Console
    location /minio-console/ {
        set $upstream_minio_console minio;
        rewrite ^/minio-console/(.*)$ /$1 break;
        proxy_pass http://$upstream_minio_console:9001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "upgrade";
        proxy_set_header Upgrade $http_upgrade;
    }

    # RabbitMQ Management
    location /rabbitmq/ {
        set $upstream_rabbitmq rabbitmq;
        rewrite ^/rabbitmq/(.*)$ /$1 break;
        proxy_pass http://$upstream_rabbitmq:15672;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
