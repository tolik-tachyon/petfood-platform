name: Deploy to local production (self-hosted)

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      full_deploy:
        description: Rebuild all application containers
        type: boolean
        default: false

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, linux, petfood-prod]
    timeout-minutes: 60

    steps:
      - name: Selective deploy on local server
        shell: bash
        run: |
          set -euo pipefail
          PROJECT_DIR="/home/iot/PetFood/petfood_platforma"
          export FULL_DEPLOY="${{ github.event_name == 'workflow_dispatch' && inputs.full_deploy == true && '1' || '0' }}"
          export DEPLOY_BEFORE_SHA="${{ github.event.before }}"
          export DEPLOY_AFTER_SHA="${{ github.sha }}"
          chmod +x "$PROJECT_DIR/scripts/deploy-selective.sh"
          "$PROJECT_DIR/scripts/deploy-selective.sh"
