server {
    listen 80;
    server_name _;

    # Прокси API-запросов на gateway-сервис
    location /petfood/api/ {
        proxy_pass http://gateway-service:8090/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Статика и SPA-роутинг под префиксом /petfood/
    location /petfood/ {
        alias /usr/share/nginx/html/;
        index  index.html;
        try_files $uri $uri/ /petfood/index.html;
    }

    # Корень — редирект на /petfood/
    location = / {
        return 301 /petfood/;
    }

    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;
    }
}