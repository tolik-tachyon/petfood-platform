server:
  port: 8083

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:petsrecipes}
    username: ${DB_USERNAME:pets_user}
    password: ${DB_PASSWORD:pets_pass}
    driver-class-name: org.postgresql.Driver

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_schema: pets

  flyway:
    enabled: true
    locations: classpath:db/migration
    default-schema: pets
    baseline-on-migrate: true
    schemas: pets
    create-schemas: true

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${JWK_SET_URI:http://127.0.0.1:8082/.well-known/jwks.json}

  rabbitmq:
    host: ${RABBITMQ_HOST:pets-rabbit}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

app:
  minio:
    endpoint: ${PETS_MINIO_ENDPOINT}
    access-key: ${PETS_MINIO_ACCESS_KEY}
    secret-key: ${PETS_MINIO_SECRET_KEY}
    bucket: ${PETS_MINIO_BUCKET:pets}
    upload-ttl-seconds: ${PETS_MINIO_UPLOAD_TTL_SECONDS:300}
    download-ttl-seconds: ${PETS_MINIO_DOWNLOAD_TTL_SECONDS:86400}
  photo-storage:
    type: fs
    base-url: ${PETS_PHOTO_STORAGE_BASE_URL:}
    fs:
      root-dir: ${PETS_PHOTO_DIR:/data/pets-photos}


  account:
    base-url: ${ACCOUNT_SERVICE_URL:http://pets-account:8081}
  frontend:
    base-url: ${FRONTEND_BASE_URL:https://petfood.astanait.edu.kz}


management:
  endpoints:
    web:
      exposure:
        include: health,info
