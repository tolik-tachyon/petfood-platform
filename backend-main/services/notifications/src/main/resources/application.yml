server:
  port: 8084

spring:
  application:
    name: notifications

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

logging:
  level:
    root: INFO

smtp:
  gmail:
    # Generic SMTP (Gmail, Brevo smtp-relay.brevo.com, etc.)
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    start-tls: ${SMTP_STARTTLS:true}
    ssl: ${SMTP_SSL:false}
    user: ${SMTP_GMAIL_USER:}
    pass: ${SMTP_GMAIL_PASS:}
    from: ${SMTP_GMAIL_FROM:}
