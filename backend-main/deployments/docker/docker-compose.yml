services:
  postgres:
    image: postgres:16-alpine
    container_name: pets-postgres
    ports:
      - "${PG_HOST_PORT}:5432"
    environment:
      POSTGRES_DB: "${POSTGRES_DB}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    container_name: pets-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: pets-rabbit
    ports:
      - "5673:5672"
      - "15673:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    command: >
      sh -c "echo 'loopback_users.guest = false' > /etc/rabbitmq/rabbitmq.conf &&
             rabbitmq-server"
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "check_running" ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - rabbit-data:/var/lib/rabbitmq

  gateway:
    build:
      context: ../..
      dockerfile: platform/gateway/Dockerfile
    container_name: pets-gateway
    depends_on:
      auth:
        condition: service_started
      account:
        condition: service_started
      pets:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SERVER_PORT: 8090

      AUTH_BASE_URL: http://pets-auth:8082
      AUTH_EXCHANGE_PATH: /api/v1/auth/sid/exchange

      ACCOUNT_SERVICE_URL: http://pets-account:8081
      PETS_SERVICE_URL: http://pets-pets:8083
      AUTH_SERVICE_URL: http://pets-auth:8082

      REDIS_HOST: pets-redis
      REDIS_PORT: 6379
    ports:
      - "8090:8090"

  auth:
    build:
      context: ../..
      dockerfile: services/auth/Dockerfile
    container_name: pets-auth
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_HOST: pets-postgres
      DB_PORT: 5432
      DB_NAME: petsrecipes
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: pets-redis
      REDIS_PORT: 6379
      JWT_ISSUER: http://pets-auth:8082
      JWT_TTL_SECONDS: 300
      JWT_KID_TTL_SECONDS: 3600
    ports:
      - "8082:8082"

  account:
    build:
      context: ../..
      dockerfile: services/account/Dockerfile
    container_name: pets-account
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_HOST: pets-postgres
      DB_PORT: 5432
      DB_NAME: petsrecipes
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: pets-redis
      REDIS_PORT: 6379
      JWK_SET_URI: http://pets-auth:8082/.well-known/jwks.json
      RABBITMQ_HOST: pets-rabbit
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
    ports:
      - "8081:8081"

  pets:
    build:
      context: ../..
      dockerfile: services/pets/Dockerfile
    container_name: pets-pets
    depends_on:
      postgres:
        condition: service_healthy
      auth:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_HOST: pets-postgres
      DB_PORT: 5432
      DB_NAME: petsrecipes
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      JWK_SET_URI: http://pets-auth:8082/.well-known/jwks.json
      ACCOUNT_SERVICE_URL: ${ACCOUNT_SERVICE_URL}
      PETS_MINIO_ENDPOINT: ${PETS_MINIO_ENDPOINT}
      PETS_MINIO_ACCESS_KEY: ${PETS_MINIO_ACCESS_KEY}
      PETS_MINIO_SECRET_KEY: ${PETS_MINIO_SECRET_KEY}
      PETS_MINIO_BUCKET: ${PETS_MINIO_BUCKET}
      PETS_MINIO_UPLOAD_TTL_SECONDS: ${PETS_MINIO_UPLOAD_TTL_SECONDS}
      PETS_MINIO_DOWNLOAD_TTL_SECONDS: ${PETS_MINIO_DOWNLOAD_TTL_SECONDS}
    ports:
      - "8083:8083"

  notifications:
    build:
      context: ../..
      dockerfile: services/notifications/Dockerfile
    container_name: pets-notifications
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      RABBITMQ_HOST: pets-rabbit
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_STARTTLS: ${SMTP_STARTTLS:-true}
      SMTP_SSL: ${SMTP_SSL:-false}
      SMTP_GMAIL_USER: ${SMTP_GMAIL_USER}
      SMTP_GMAIL_PASS: ${SMTP_GMAIL_PASS}
      SMTP_GMAIL_FROM: ${SMTP_GMAIL_FROM}
    ports:
      - "8084:8084"

volumes:
  pg-data:
  redis-data:
  rabbit-data:
