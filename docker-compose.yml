version: '3.8'

services:
  # ============ INFRASTRUCTURE ============
  postgres:
    image: postgres:16-alpine
    container_name: pets_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      - pets_network

  redis:
    image: redis:7.2-alpine
    container_name: pets_redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped
    networks:
      - pets_network

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: pets_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    command: >
      sh -c "echo 'loopback_users.guest = false' > /etc/rabbitmq/rabbitmq.conf &&
             rabbitmq-server"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped
    networks:
      - pets_network

  minio:
    image: minio/minio:latest
    container_name: pets_minio
    command: server --console-address ":9001" /data
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - pets_network

  # ============ BACKEND SERVICES ============
  auth-service:
    build:
      context: ./backend-main
      dockerfile: services/auth/Dockerfile
    container_name: pets_auth_service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_ISSUER: http://auth-service:8082
      JWT_TTL_SECONDS: 300
      JWT_KID_TTL_SECONDS: 3600
    restart: unless-stopped
    networks:
      - pets_network

  account-service:
    build:
      context: ./backend-main
      dockerfile: services/account/Dockerfile
    container_name: pets_account_service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-service:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWK_SET_URI: http://auth-service:8082/.well-known/jwks.json
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
    restart: unless-stopped
    networks:
      - pets_network

  pets-service:
    build:
      context: ./backend-main
      dockerfile: services/pets/Dockerfile
    container_name: pets_pets_service
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_started
      minio:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      PETS_MINIO_ENDPOINT: ${PETS_MINIO_ENDPOINT}
      PETS_MINIO_ACCESS_KEY: ${PETS_MINIO_ACCESS_KEY}
      PETS_MINIO_SECRET_KEY: ${PETS_MINIO_SECRET_KEY}
      PETS_MINIO_BUCKET: ${PETS_MINIO_BUCKET}
      PETS_MINIO_UPLOAD_TTL_SECONDS: ${PETS_MINIO_UPLOAD_TTL_SECONDS}
      PETS_MINIO_DOWNLOAD_TTL_SECONDS: ${PETS_MINIO_DOWNLOAD_TTL_SECONDS}
      ACCOUNT_SERVICE_URL: ${ACCOUNT_SERVICE_URL}
      JWK_SET_URI: http://auth-service:8082/.well-known/jwks.json
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
    restart: unless-stopped
    networks:
      - pets_network

  notifications-service:
    build:
      context: ./backend-main
      dockerfile: services/notifications/Dockerfile
    container_name: pets_notifications_service
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_STARTTLS: ${SMTP_STARTTLS:-true}
      SMTP_SSL: ${SMTP_SSL:-false}
      SMTP_GMAIL_USER: ${SMTP_GMAIL_USER}
      SMTP_GMAIL_PASS: ${SMTP_GMAIL_PASS}
      SMTP_GMAIL_FROM: ${SMTP_GMAIL_FROM}
    restart: unless-stopped
    networks:
      - pets_network

  # ============ API GATEWAY ============
  gateway-service:
    build:
      context: ./backend-main
      dockerfile: platform/gateway/Dockerfile
    container_name: pets_gateway_service
    depends_on:
      auth-service:
        condition: service_started
      account-service:
        condition: service_started
      pets-service:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SERVER_PORT: 8090
      AUTH_BASE_URL: http://auth-service:8082
      AUTH_EXCHANGE_PATH: /api/v1/auth/sid/exchange
      ACCOUNT_SERVICE_URL: http://account-service:8081
      PETS_SERVICE_URL: http://pets-service:8083
      AUTH_SERVICE_URL: http://auth-service:8082
      REDIS_HOST: redis
      REDIS_PORT: 6379
    restart: unless-stopped
    networks:
      - pets_network

  # ============ AI RECOMMENDER ============
  recommender-api:
    build:
      context: ./nutrient-recommender-main
      dockerfile: Dockerfile
    container_name: pets_recommender_api
    environment:
      PYTHONUNBUFFERED: 1
    restart: unless-stopped
    networks:
      - pets_network

  # ============ FRONTEND ============
  frontend:
    build:
      context: ./frontend-main
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: "http://10.1.10.144:5555/api"
    container_name: pets_frontend
    restart: unless-stopped
    networks:
      - pets_network

  # ============ REVERSE PROXY ============
  nginx:
    image: nginx:alpine
    container_name: pets_nginx
    ports:
      - "5555:5555"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - gateway-service
      - recommender-api
      - minio
      - rabbitmq
    restart: unless-stopped
    networks:
      - pets_network

networks:
  pets_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  minio_data:
